<!DOCTYPE html>
<html>
<head>
  <title>Clash Broadcaster</title>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
</head>
<body>
<script>
  // Minimal Agora RTC broadcast page.
  // Captures microphone (which PipeWire maps to Mixed_Sink containing both agents)
  // and publishes to the spectator channel.

  let client = null;
  let localAudioTrack = null;

  window.startBroadcast = async function(config) {
    try {
      client = AgoraRTC.createClient({ mode: "live", codec: "vp8", role: "host" });

      await client.join(config.appId, config.channelName, config.token, config.uid);

      // Create microphone track — PipeWire routes Mixed_Sink to this browser's mic
      localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({
        encoderConfig: "speech_standard",
      });

      await client.publish([localAudioTrack]);

      return { success: true };
    } catch (err) {
      return { success: false, error: err.message || String(err) };
    }
  };

  window.stopBroadcast = async function() {
    try {
      if (localAudioTrack) {
        localAudioTrack.stop();
        localAudioTrack.close();
        localAudioTrack = null;
      }
      if (client) {
        await client.leave();
        client = null;
      }
    } catch (err) {
      console.error("stopBroadcast error:", err);
    }
  };
</script>
</body>
</html>
