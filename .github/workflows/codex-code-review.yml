name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Codex Code Review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are a senior code reviewer. Review the changes in PR #${{ github.event.pull_request.number }}.

            PR Title: ${{ github.event.pull_request.title }}
            PR Description: ${{ github.event.pull_request.body }}

            Changed files:
            ${{ steps.diff.outputs.diff }}

            Focus on:
            1. Security issues (injection, auth bypass, credential exposure)
            2. Logic errors and edge cases
            3. Performance concerns
            4. Code quality and maintainability

            Be concise. Only comment on real issues, not style preferences.
            If the code looks good, say so briefly.

      - name: Post Review Comment
        if: steps.run_codex.outputs.final-message != ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🤖 Codex Code Review\n\n${process.env.REVIEW_BODY}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
        env:
          REVIEW_BODY: ${{ steps.run_codex.outputs.final-message }}
