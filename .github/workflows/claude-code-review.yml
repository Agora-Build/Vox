name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Run the review as plain automation: Claude returns the review as its
      # result (execution_file); we post it ourselves below. This avoids the
      # action's track_progress tracking comment ("Claude finished … View job").
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            You are a senior code reviewer. Review the changes in PR #${{ github.event.pull_request.number }} of ${{ github.repository }}.

            PR Title: ${{ github.event.pull_request.title }}
            PR Description: ${{ github.event.pull_request.body }}

            Changed files:
            ${{ steps.diff.outputs.diff }}

            Read the diff and the relevant files, then focus on:
            1. Security issues (injection, auth bypass, credential exposure)
            2. Logic errors and edge cases
            3. Performance concerns
            4. Code quality and maintainability

            Be concise. Only comment on real issues, not style preferences. If the
            code looks good, say so briefly. Output ONLY the review as markdown —
            do not post any comments yourself. Do NOT add your own title or top
            heading (e.g. "Code Review: ..."); start directly with the findings.
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

      - name: Post Review Comment
        if: steps.claude-review.outputs.execution_file != ''
        uses: actions/github-script@v7
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        with:
          script: |
            const fs = require('fs');
            let review = '';
            try {
              const data = JSON.parse(fs.readFileSync(process.env.EXECUTION_FILE, 'utf8'));
              const items = Array.isArray(data) ? data : [data];
              // Prefer the final result entry; fall back to the last assistant text.
              const result = [...items].reverse().find(
                (m) => m && m.type === 'result' && typeof m.result === 'string',
              );
              if (result) {
                review = result.result;
              } else {
                const a = [...items].reverse().find(
                  (m) => m && (m.role === 'assistant' || m.type === 'assistant'),
                );
                const content = a && (a.content ?? a.message?.content);
                review = typeof content === 'string'
                  ? content
                  : Array.isArray(content)
                    ? content.map((c) => c.text || '').join('')
                    : '';
              }
            } catch (e) {
              core.warning(`Could not parse execution file: ${e.message}`);
            }
            if (review.trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🤖 Claude Code Review\n\n${review.trim()}`,
              });
            } else {
              core.warning('No review text extracted; nothing posted.');
            }
