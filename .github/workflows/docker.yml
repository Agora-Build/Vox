name: Build & Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'server/**'
      - 'client/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'drizzle.config.ts'
      - 'vox_eval_agentd/**'
      - 'vox_clash_runner/**'
      - '.github/workflows/docker.yml'

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      vox-service: ${{ steps.filter.outputs.vox-service }}
      vox-eval-agentd: ${{ steps.filter.outputs.vox-eval-agentd }}
      vox-clash-runner: ${{ steps.filter.outputs.vox-clash-runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vox-service:
              - 'Dockerfile'
              - 'server/**'
              - 'client/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - 'drizzle.config.ts'
            vox-eval-agentd:
              - 'vox_eval_agentd/**'
            vox-clash-runner:
              - 'vox_clash_runner/**'

  build-vox-service:
    needs: changes
    if: needs.changes.outputs.vox-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vox
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-vox-eval-agentd:
    needs: changes
    if: needs.changes.outputs.vox-eval-agentd == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync aeval-data submodule to AEVAL_VERSION tag
        run: |
          AEVAL_VERSION=$(grep 'ARG AEVAL_VERSION=' vox_eval_agentd/Dockerfile | cut -d= -f2)
          echo "AEVAL_VERSION=${AEVAL_VERSION}"
          cd vox_eval_agentd/aeval-data
          git fetch origin tag "${AEVAL_VERSION}" --no-tags
          git checkout "${AEVAL_VERSION}"
          echo "aeval-data synced to ${AEVAL_VERSION} ($(git rev-parse --short HEAD))"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vox-eval-agentd
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./vox_eval_agentd
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAG=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Smoke test eval agent image
        run: |
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          docker run --rm "$IMAGE_TAG" bash -c "
            echo '=== Node ===' && node --version &&
            echo '=== aeval ===' && aeval --version &&
            echo '=== Chrome ===' && cd /app/voice-agent-tester &&
              node -e \"const p=require('puppeteer'); const b=p.executablePath();
              require('child_process').execSync(b+' --version --no-sandbox',{stdio:'inherit'})\" &&
            echo '=== Daemon syntax ===' && node --check /app/vox-agentd.js &&
            echo 'All smoke tests passed'
          "

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ./vox_eval_agentd
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAG=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  build-vox-clash-runner:
    needs: changes
    if: needs.changes.outputs.vox-clash-runner == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vox-clash-runner
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./vox_clash_runner
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAG=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Smoke test clash runner image
        run: |
          IMAGE_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          docker run --rm "$IMAGE_TAG" bash -c "
            echo '=== Node ===' && node --version &&
            echo '=== Chromium ===' && node -e \"const {chromium}=require('playwright-core'); console.log('playwright-core ok')\" &&
            echo '=== Runner syntax ===' && node --check /app/clash-runner.js &&
            echo 'All smoke tests passed'
          "

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ./vox_clash_runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TAG=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
